name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false   # never cancel in-flight deploys

env:
  NODE_VERSION: "20"
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: prajashakti-api
  EKS_CLUSTER: prajashakti
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            --label "built.at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./apps/api

      - name: Push to ECR
        id: push
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://api-staging.prajashakti.in

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to staging
        run: |
          kubectl set image deployment/prajashakti-api \
            api=${{ needs.build.outputs.image }} \
            --namespace=staging
          kubectl rollout status deployment/prajashakti-api \
            --namespace=staging \
            --timeout=120s

      - name: Verify health endpoint
        run: |
          sleep 10
          curl -sf https://api-staging.prajashakti.in/api/health | grep -q '"status":"ok"'

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production          # GitHub environment with required reviewer approval gate
      url: https://api.prajashakti.in

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}-prod

      - name: Deploy to production
        run: |
          kubectl set image deployment/prajashakti-api \
            api=${{ needs.build.outputs.image }} \
            --namespace=production
          kubectl rollout status deployment/prajashakti-api \
            --namespace=production \
            --timeout=180s

      - name: Verify health endpoint
        run: |
          sleep 15
          curl -sf https://api.prajashakti.in/api/health | grep -q '"status":"ok"'

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}"
          COLOR="${STATUS == 'success' && 'good' || 'danger'}"
          ICON="${STATUS == 'success' && ':rocket:' || ':fire:'}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"text\": \"${ICON} *API Deploy ${STATUS}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_number }}>\n*Image:* \`${{ env.IMAGE_TAG }}\`\n*Actor:* ${{ github.actor }}\"
              }]
            }"
